<!DOCTYPE html>
<!-- Created by Claude -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pixel Image Importer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: monospace;
      background: #f5f5f0;
      color: #1a1a1a;
      padding: 2rem;
      min-height: 100vh;
    }

    h1 {
      font-size: 1rem;
      font-weight: normal;
      margin-bottom: 1.5rem;
      color: #666;
    }

    /* ── Drop zone ── */
    #drop-zone {
      border: 1.5px dashed #aaa;
      border-radius: 10px;
      padding: 2.5rem 1.5rem;
      text-align: center;
      cursor: pointer;
      position: relative;
      transition: background 0.15s, border-color 0.15s;
      background: #fff;
    }

    #drop-zone.drag-over {
      background: #eef4ff;
      border-color: #6699dd;
    }

    #drop-zone .hint {
      font-size: 13px;
      color: #888;
      line-height: 2;
    }

    #drop-zone .icon {
      font-size: 2rem;
      display: block;
      margin-bottom: 8px;
    }

    /* Invisible file input overlaid on the drop zone */
    #file-input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    /* ── Info bar ── */
    #info-bar {
      display: none;
      margin-top: 12px;
      padding: 10px 14px;
      background: #ebebeb;
      border-radius: 8px;
      font-size: 12px;
      color: #555;
      gap: 16px;
      flex-wrap: wrap;
    }

    /* ── Filter buttons ── */
    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .filters button {
      font-family: monospace;
      font-size: 12px;
      padding: 5px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      transition: background 0.1s;
    }

    .filters button:hover:not(:disabled) { background: #f0f0f0; }
    .filters button:active:not(:disabled) { transform: scale(0.97); }
    .filters button:disabled { opacity: 0.35; cursor: default; }

    #btn-reset { margin-left: auto; }

    /* ── Canvas ── */
    #canvas {
      display: none;
      max-width: 100%;
      margin-top: 16px;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    /* ── Pixel inspector ── */
    #pixel-info {
      display: none;
      margin-top: 8px;
      font-size: 11px;
      color: #999;
      min-height: 1.4em;
    }
  </style>
</head>
<body>

  <h1>pixel image importer</h1>

  <!-- Import zone: drag-and-drop + click-to-browse -->
  <div id="drop-zone">
    <span class="icon">🖼</span>
    <div class="hint">drag &amp; drop · paste (Ctrl/Cmd+V) · or click to choose a file</div>
    <input type="file" id="file-input" accept="image/*" />
  </div>

  <!-- Metadata shown after load -->
  <div id="info-bar"></div>

  <!-- Pixel-processing filter buttons -->
  <div class="filters">
    <button id="btn-grey"   disabled onclick="applyFilter('grey')">greyscale</button>
    <button id="btn-flat"   disabled onclick="applyFilter('flat')">flat</button>
    <button id="btn-redgreen"   disabled onclick="applyFilter('redgreen')">redgreen</button>
    <button id="btn-mirror"   disabled onclick="applyFilter('mirror')">mirror</button>
    <button id="btn-jigsaw"   disabled onclick="applyFilter('jigsaw')">jigsaw</button>
    <button id="btn-invert" disabled onclick="applyFilter('invert')">invert</button>
    <button id="btn-sepia"  disabled onclick="applyFilter('sepia')">sepia</button>
    <button id="btn-edge"   disabled onclick="applyFilter('edge')">edge detect</button>
    <button id="btn-reset"  disabled onclick="applyFilter('reset')">reset</button>
  </div>

  <!-- Output canvas -->
  <canvas id="canvas"></canvas>

  <!-- Pixel inspector readout -->
  <div id="pixel-info">hover over the image to inspect pixels</div>

  <script>
    const canvas    = document.getElementById('canvas');
    const ctx       = canvas.getContext('2d');
    const dropZone  = document.getElementById('drop-zone');
    const infoBar   = document.getElementById('info-bar');
    const pixelInfo = document.getElementById('pixel-info');
    const buttons   = ['btn-grey','btn-flat','btn-redgreen','btn-mirror','btn-jigsaw','btn-invert','btn-sepia','btn-edge','btn-reset'];

    let originalData = null;   // ImageData snapshot of the freshly-loaded image

    // ── Core loader: File → canvas ──────────────────────────────────────────
    function loadImage(file) {
      if (!file || !file.type.startsWith('image/')) return;

      const url = URL.createObjectURL(file);
      const img = new Image();

      img.onload = () => {
        // Scale down large images to fit the container
        const maxW = dropZone.offsetWidth || 800;
        const scale = Math.min(1, maxW / img.width);
        canvas.width  = Math.round(img.width  * scale);
        canvas.height = Math.round(img.height * scale);

        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

        // Keep a pristine copy for the reset button
        originalData = ctx.getImageData(0, 0, canvas.width, canvas.height);

        // Show UI
        canvas.style.display = 'block';
        dropZone.style.display = 'none';

        infoBar.style.display = 'flex';
        infoBar.innerHTML =
          `<span>file: ${file.name || 'pasted image'}</span>` +
          `<span>original: ${img.width}×${img.height}px</span>` +
          `<span>canvas: ${canvas.width}×${canvas.height}</span>` +
          `<span>${(file.size / 1024).toFixed(1)} KB</span>`;

        pixelInfo.style.display = 'block';
        buttons.forEach(id => document.getElementById(id).disabled = false);

        URL.revokeObjectURL(url);
      };

      img.src = url;
    }

    // ── Import method 1: Drag and drop ──────────────────────────────────────
    dropZone.addEventListener('dragover', e => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });
    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('drag-over');
    });
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      loadImage(e.dataTransfer.files[0]);
    });

    // ── Import method 2: File input (click to browse) ───────────────────────
    document.getElementById('file-input').addEventListener('change', e => {
      loadImage(e.target.files[0]);
    });

    // ── Import method 3: Paste (Ctrl/Cmd+V) ─────────────────────────────────
    document.addEventListener('paste', e => {
      const items = [...e.clipboardData.items];
      console.log('Clipboard types:', items.map(i => i.type));
      const item = items.find(i => i.type.startsWith('image/'));
      if (item) loadImage(item.getAsFile());
    });

    // ── Pixel inspector ─────────────────────────────────────────────────────
    canvas.addEventListener('mousemove', e => {
      const rect = canvas.getBoundingClientRect();
      const sx = canvas.width  / rect.width;
      const sy = canvas.height / rect.height;
      const x  = Math.floor((e.clientX - rect.left) * sx);
      const y  = Math.floor((e.clientY - rect.top)  * sy);
      const d  = ctx.getImageData(x, y, 1, 1).data;
      const hex = '#' + [d[0], d[1], d[2]]
        .map(v => v.toString(16).padStart(2, '0'))
        .join('');
      pixelInfo.textContent =
        `pixel (${x}, ${y})  →  r:${d[0]}  g:${d[1]}  b:${d[2]}  a:${d[3]}  |  hex: ${hex}`;
    });

    // ── Pixel filters ────────────────────────────────────────────────────────
    function applyFilter(type) {
      if (!originalData) return;

      // Always read from the original (so filters don't compound)
      const src = originalData.data;
      const w   = canvas.width;
      const h   = canvas.height;
      const out = ctx.createImageData(w, h);
      const d   = out.data;

      if (type === 'reset') {
        ctx.putImageData(originalData, 0, 0);
        return;
      }

      // Per-pixel pass (greyscale / invert / sepia)
      for (let i = 0; i < src.length; i += 4) {
        let r = src[i], g = src[i+1], b = src[i+2], a = src[i+3];

        if (type === 'grey') {
          // Luminosity-weighted greyscale
          const l = Math.round(0.299 * r + 0.587 * g + 0.114 * b);
          r = g = b = l;

        } else if (type === 'flat') {
          const l = Math.round(0.33 * r + 0.33 * g + 0.33 * b);
          r = g = b = l;

        } else if (type === 'redgreen') {
          r = g = Math.round(0.333 * r + 0.666 * g);

        } else if (type === 'invert') {
          r = 255 - r;
          g = 255 - g;
          b = 255 - b;

        } else if (type === 'sepia') {
          const nr = Math.min(255, Math.round(r * 0.393 + g * 0.769 + b * 0.189));
          const ng = Math.min(255, Math.round(r * 0.349 + g * 0.686 + b * 0.168));
          const nb = Math.min(255, Math.round(r * 0.272 + g * 0.534 + b * 0.131));
          r = nr; g = ng; b = nb;
        }

        d[i] = r; d[i+1] = g; d[i+2] = b; d[i+3] = a;
      }

      if (type === 'mirror') {
        for (let y = 0; y < h; y++) {
          for (let x = 0; x < w; x++) {
            const i = (y * w + x) * 4;  // index in src
            const r = src[i], g = src[i+1], b = src[i+2], a = src[i+3];
            const dx = w - x - 1;
            const di = (y * w + dx) * 4;
            d[di] = r; d[di+1] = g; d[di+2] = b; d[di+3] = a;
          }
        }
      }

      if (type === 'jigsaw') {
        const n = 4;
        const wx = ~~(w / n);
        const hy = ~~(h / n);
        const arr = Array.from({ length: n*n }, (_, i) => i);

        // Fisher-Yates shuffle
        for (let fi = arr.length - 1; fi > 0; fi--) {
          const fj = Math.floor(Math.random() * (fi + 1));
          [arr[fi], arr[fj]] = [arr[fj], arr[fi]]; // swap
        }

        for (let y = 0; y < h; y++) {    // pos in dest
          for (let x = 0; x < w; x++) {  // pos in dest
            const tx = ~~(x / wx);
            const ty = ~~(y / hy);
            const rx = x - tx * wx;
            const ry = y - ty * hy;
            const arr_i = ty * n + tx;
            const shuffled_i = arr[arr_i];
            const shuffled_x = shuffled_i % n;    // src tile
            const shuffled_y = ~~(shuffled_i / n);
            const sx = (shuffled_x * wx + rx) % w;   // src pixel x
            const sy = (shuffled_y * hy + ry) % h;
            const di = (y * w + x) * 4;  // index in dest

            const si = (sy * w + sx) * 4;
            const r = src[si], g = src[si+1], b = src[si+2], a = src[si+3];
            d[di] = r; d[di+1] = g; d[di+2] = b; d[di+3] = a;
          }
        }
      }

      // Edge detection: 3×3 Laplacian convolution kernel
      if (type === 'edge') {
        const kern = [-1, -1, -1,
                      -1,  8, -1,
                      -1, -1, -1];

        // Convert to greyscale first, then convolve
        const grey = new Float32Array(w * h);
        for (let i = 0; i < src.length; i += 4) {
          grey[i / 4] = 0.299 * src[i] + 0.587 * src[i+1] + 0.114 * src[i+2];
        }

        for (let y = 1; y < h - 1; y++) {
          for (let x = 1; x < w - 1; x++) {
            let sum = 0, ki = 0;
            for (let ky = -1; ky <= 1; ky++) {
              for (let kx = -1; kx <= 1; kx++) {
                sum += grey[(y + ky) * w + (x + kx)] * kern[ki++];
              }
            }
            const v  = Math.min(255, Math.max(0, Math.abs(Math.round(sum))));
            const pi = (y * w + x) * 4;
            d[pi] = d[pi+1] = d[pi+2] = v;
            d[pi+3] = 255;
          }
        }
      }

      ctx.putImageData(out, 0, 0);
    }
  </script>
</body>
</html>
